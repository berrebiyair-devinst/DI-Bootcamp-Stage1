<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Kit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1> Drum Kit</h1>

<div class="drum-kit">

    <div class="key" data-key="a">
        <h2>A</h2>
        <span>Clap</span>
    </div>

    <div class="key" data-key="z">
        <h2>Z</h2>
        <span>HiHat</span>
    </div>

    <div class="key" data-key="e">
        <h2>E</h2>
        <span>Kick</span>
    </div>

    <div class="key" data-key="r">
        <h2>R</h2>
        <span>OpenHat</span>
    </div>

    <div class="key" data-key="t">
        <h2>T</h2>
        <span>Boom</span>
    </div>

    <div class="key" data-key="y">
        <h2>Y</h2>
        <span>Ride</span>
    </div>

    <div class="key" data-key="u">
        <h2>U</h2>
        <span>Snare</span>
    </div>

    <div class="key" data-key="i">
        <h2>I</h2>
        <span>Tom</span>
    </div>

    <div class="key" data-key="o">
        <h2>O</h2>
        <span>Tink</span>
    </div>

</div>

<audio data-key="a" src="sounds/clap.wav"></audio>
<audio data-key="z" src="sounds/hihat.wav"></audio>
<audio data-key="e" src="sounds/kick.wav"></audio>
<audio data-key="r" src="sounds/openhat.wav"></audio>
<audio data-key="t" src="sounds/boom.wav"></audio>
<audio data-key="y" src="sounds/ride.wav"></audio>
<audio data-key="u" src="sounds/snare.wav"></audio>
<audio data-key="i" src="sounds/tom.wav"></audio>
<audio data-key="o" src="sounds/tink.wav"></audio>

<script src="script.js"></script>

</body>
</html>
