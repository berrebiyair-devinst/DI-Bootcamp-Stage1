<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exercise 7</h1>
    <section class="listBooks"></section>
    <script>

 
// Sélection de la section HTML où on va afficher les livres
// querySelector permet de récupérer un élément du DOM (ici la section .listBooks)
const section = document.querySelector(".listBooks");

// Création d’un tableau contenant des objets (chaque objet = un livre)
const allBooks = [
  {
    title: "Harry Potter ",
    author: "J.K. Rowling",
    image: "https://m.media-amazon.com/images/I/51UoqRAxwEL.jpg",
    alreadyRead: true
  },
  {
    title: "Le Seigneur des Anneaux",
    author: "J.R.R. Tolkien",
    image: "https://m.media-amazon.com/images/I/91SZSW8qSsL.jpg",
    alreadyRead: false
  }
];

// Boucle pour parcourir chaque livre du tableau
// i = index (position dans le tableau)
for (let i = 0; i < allBooks.length; i++) {

  // Création d’un élément <div> pour contenir un livre
  // createElement permet de créer un élément HTML
  const bookDiv = document.createElement("div");

  // Création d’un paragraphe <p> pour afficher le texte du livre
  const bookInfo = document.createElement("p");

  // textContent permet d’écrire du texte dans un élément HTML
  // ${} permet d’insérer des variables dans une chaîne de caractères
  bookInfo.textContent = `${allBooks[i].title} écrit par ${allBooks[i].author}`;

  // Création d’une image <img>
  const img = document.createElement("img");

  // src définit l’image à afficher (lien URL)
  img.src = allBooks[i].image;

  // style.width permet de modifier le CSS directement en JS
  img.style.width = "100px";

  // Ajout du texte (p) dans le div
  // appendChild ajoute un élément dans un autre élément
  bookDiv.appendChild(bookInfo);

  // Ajout de l’image dans le div
  bookDiv.appendChild(img);

  // Condition : si le livre a déjà été lu
  // (alreadyRead === true)
  if (allBooks[i].alreadyRead === true) {

    // On change la couleur du texte en rouge
    bookDiv.style.color = "red";
  }

  // Ajout du div complet dans la section HTML
  section.appendChild(bookDiv);
}
    </script>
</body>
</html>
