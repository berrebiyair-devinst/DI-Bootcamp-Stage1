    <script>

const calculator = (x,y, operator) =>{
    switch (operator){

        case "+":
            return x+y;
        case "-":
            return x-y
        case "*":
            return x*y;
        case "/":
            return x/y;
        
    }
 return(operator != "*"||"+"||"-"||"/" ? "ok" : "Invalid");

};
console.log(calculator(21,21,"2"));
