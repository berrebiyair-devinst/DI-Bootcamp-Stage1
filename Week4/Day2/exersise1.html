<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
// exersise 1

 // #1
function funcOne() {
    let a = 5;

    if(a > 1) {
        a = 3;
    }

    alert(`inside the funcOne function ${a}`);
}

// #1.1
funcOne();

// Result: 3
// Explanation:
// The variable a starts with the value 5.
// Since 5 is greater than 1, the if condition is true.
// The value of a changes from 5 to 3.
// The alert displays 3.



// #1.2 What happens if we use const instead of let?

// const a = 5;
// a = 3;

// Error: Assignment to constant variable.
// Explanation:
// A const variable cannot be reassigned.
// The line a = 3 tries to change the value of a, which is not allowed.



// --------------------------------------------------


// #2

let a = 0;

function funcTwo() {
    a = 5;
}

function funcThree() {
    alert(`inside the funcThree function ${a}`);
}


// #2.1

funcThree();

// Result: 0
// Explanation:
// The global variable a is initialized with 0.
// funcThree accesses the global variable.


funcTwo();

// The value of the global variable a becomes 5.
// Explanation:
// funcTwo modifies the global variable a.


funcThree();

// Result: 5
// Explanation:
// funcThree now displays the updated value of a.



// #2.2 What happens if we use const instead of let?

// const a = 0;

// Error: Assignment to constant variable.
// Explanation:
// funcTwo tries to change a from 0 to 5.
// A const variable cannot be modified.



// --------------------------------------------------


// #3

function funcFour() {
    window.a = "hello";
}


function funcFive() {
    alert(`inside the funcFive function ${a}`);
}


// #3.1

funcFour();

// Creates a global variable window.a with the value "hello".


funcFive();

// Result: hello
// Explanation:
// funcFive can access the global variable a created by funcFour.



// --------------------------------------------------


// #4

let a = 1;

function funcSix() {

    let a = "test";

    alert(`inside the funcSix function ${a}`);
}


// #4.1

funcSix();

// Result: test
// Explanation:
// The local variable a inside funcSix hides the global variable a.
// JavaScript uses the closest variable available.



// #4.2 What happens if we use const instead of let?

// Result: test
// Explanation:
// The value of a is never changed, so const works perfectly.



// --------------------------------------------------


// #5

let a = 2;

if (true) {

    let a = 5;

    alert(`in the if block ${a}`);
}

alert(`outside of the if block ${a}`);


// Result:
// in the if block 5
// outside of the if block 2


// Explanation:
// The variable a inside the if block is a different variable.
// It only exists inside the block.
// Outside the block, JavaScript uses the global variable a.



// #5.2 What happens if we use const instead of let?

// Result:
// in the if block 5
// outside of the if block 2

// Explanation:
// The variables are never reassigned, so const works the same way.

    </script>
</body>
</html>
