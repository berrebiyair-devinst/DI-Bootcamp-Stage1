<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        class Person {
  constructor(name) {
    this.name = name;
  }
}

const member = new Person('John');
console.log(typeof member);

// Output: "object"

// Explanation:
// `member` is an instance of the `Person` class.
// In JavaScript, every instance created with the `new` keyword is an object.
// Therefore, `typeof member` returns "object".
    </script>
</body>
</html>
