// Bonus
class Video {

    constructor(title, uploader, time) {
        this.title = title;
        this.uploader = uploader;
        this.time = time;
    }

    watch() {
        return `${this.uploader} watched all ${this.time} of ${this.title}!`;
    }
}


const videosData = [
    {
        title: "JavaScript",
        uploader: "Yair",
        time: 300
    },
    {
        title: "HTML",
        uploader: "John",
        time: 200
    },
    {
        title: "CSS",
        uploader: "Sarah",
        time: 150
    },
    {
        title: "Python",
        uploader: "David",
        time: 500
    },
    {
        title: "React",
        uploader: "Emma",
        time: 400
    }
];


const videos = [];


videosData.forEach(video => {

    const newVideo = new Video(
        video.title,
        video.uploader,
        video.time
    );

    videos.push(newVideo);

});


console.log(videos);

    </script>
